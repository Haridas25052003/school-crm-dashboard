<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School CRM Dashboard</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="d-flex">

        <!-- Sidebar -->
        <div id="sidebar" class="bg-dark text-white p-3" style="width:250px; height:100vh;">
            <h4>School CRM</h4>
            <ul class="nav flex-column mt-4">
                <li class="nav-item"><a href="index.html" class="nav-link text-white">Dashboard</a></li>
                <li class="nav-item"><a href="students.html" class="nav-link text-white">Students</a></li>
                <li class="nav-item"><a href="attendance.html" class="nav-link text-white">Attendance</a></li>
                <li class="nav-item"><a href="fees.html" class="nav-link text-white">Fees</a></li>
            </ul>
        </div>

        <!-- Main Content -->
        <div class="flex-grow-1">

            <!-- Navbar -->
            <nav class="navbar navbar-light bg-light px-3">
                <h5 class="mb-0">Dashboard</h5>
            </nav>

            <!-- Dashboard Content -->
            <div class="container mt-4">

                <div class="row">

                    <div class="col-md-3">
                        <div class="card p-3 shadow">
                            <h6>Total Students</h6>
                            <h3 id="totalStudents">0</h3>
                        </div>
                    </div>

                    <div class="col-md-3">
                        <div class="card p-3 shadow">
                            <h6>Attendance</h6>
                            <h3>85%</h3>
                        </div>
                    </div>

                    <div class="col-md-3">
                        <div class="card p-3 shadow">
                            <h6>Fees Collected</h6>
                            <h3>₹50,000</h3>
                        </div>
                    </div>

                    <div class="col-md-3">
                        <div class="card p-3 shadow">
                            <h6>Pending Fees</h6>
                            <h3>₹10,000</h3>
                        </div>
                    </div>

                </div>

            </div>

        </div>

    </div>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <!-- Main JS -->
    <script src="js/main.js"></script>

</body>
</html>
