<!DOCTYPE html>
<html lang="en">
<head>
    <title>Students</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="d-flex">

    <!-- Sidebar -->
    <div class="bg-dark text-white p-3" style="width:250px; height:100vh;">
        <h4>School CRM</h4>
        <ul class="nav flex-column mt-4">
            <li><a href="index.html" class="nav-link text-white">Dashboard</a></li>
            <li><a href="students.html" class="nav-link text-white">Students</a></li>
        </ul>
    </div>

    <!-- Main -->
    <div class="flex-grow-1 p-4">

        <h3>Students</h3>

        <!-- Add Student -->
        <div class="mb-3">
            <input type="text" id="name" placeholder="Student Name" class="form-control mb-2">
            <input type="text" id="class" placeholder="Class" class="form-control mb-2">
            <button id="addStudent" class="btn btn-primary">Add Student</button>
        </div>

        <!-- Search -->
        <input type="text" id="search" class="form-control mb-3" placeholder="Search student...">

        <!-- Table -->
        <table class="table table-bordered">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Class</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="studentTable"></tbody>
        </table>

    </div>

</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="js/students.js"></script>

</body>
</html>
